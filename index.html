<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🐍 贪吃蛇</h1>
    <div class="info">
      <span>得分: <strong id="score">0</strong></span>
      <span>等级: <strong id="level">1</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p class="hint">方向键或 WASD 控制 · 空格暂停</p>
    <div id="gameOver" class="overlay hidden">
      <div class="message">
        <h2>游戏结束</h2>
        <p>得分: <span id="finalScore">0</span></p>
        <button id="restartBtn">再来一局</button>
      </div>
    </div>
    <div id="startOverlay" class="overlay">
      <div class="message">
        <h2>贪吃蛇</h2>
        <p>按任意键开始</p>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
